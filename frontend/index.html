<!DOCTYPE html>
<html>

<head>

<title>SQL Lineage Viewer</title>

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre/cytoscape-dagre.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f6f7fb;
}

#search{
    padding:8px;
    width:300px;
    margin-bottom:10px;
}

.main-container{
    display:flex;
    gap:20px;
    height:85vh;
}

#cy{
    flex:2;
    border:1px solid #ddd;
    background:white;
    border-radius:8px;
}

#column-lineage{
    flex:1;
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    overflow:auto;
}

#tooltip{
    position:absolute;
    background:#333;
    color:white;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    pointer-events:none;
    display:none;
    z-index:10;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
}

th{
    background:#f2f2f2;
}

</style>

</head>

<body>

<h2>SQL Lineage Explorer</h2>

<input id="search" placeholder="Search table"/>

<div class="main-container">

<div id="cy"></div>

<div id="column-lineage">
    <h3>Select a table to view column lineage</h3>
</div>
<div id="tooltip"></div>
</div>

<script src="/static/app.js"></script>

</body>
</html>
